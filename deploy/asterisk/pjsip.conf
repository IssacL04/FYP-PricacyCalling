; ---------------------------
; Outbound trunk placeholder (SIP<->PSTN)
; Keep disabled until real credentials are configured.
; ---------------------------
[carrier_out-auth]
type=auth
auth_type=userpass
username=replace_me
password=replace_me

[carrier_out-aor]
type=aor
contact=sip:sip.example.com

[carrier_out]
type=endpoint
transport=transport-udp-privacy
context=outbound_trunk
disallow=all
allow=ulaw
aors=carrier_out-aor
outbound_auth=carrier_out-auth
from_domain=example.com
direct_media=no
disable_direct_media_on_nat=yes
rtp_keepalive=20
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
media_use_received_transport=yes

