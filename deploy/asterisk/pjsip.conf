[global]
type=global
user_agent=PrivacyCalling-Asterisk

[transport-udp-privacy]
type=transport
protocol=udp
bind=0.0.0.0:5160
; This host is behind NAT (private 10.x address), so publish public IP in SIP/SDP.
external_signaling_address=118.25.104.104
external_media_address=118.25.104.104
external_signaling_port=5160
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16

; ---------------------------
; Local SIP endpoints (SIP<->SIP test)
; ---------------------------
[alice]
type=endpoint
transport=transport-udp-privacy
context=caller_in
message_context=privacy_message_in
disallow=all
allow=ulaw
auth=alice
aors=alice
direct_media=no
disable_direct_media_on_nat=yes
rtp_keepalive=20
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
media_use_received_transport=yes

[alice]
type=auth
auth_type=userpass
username=alice
password=alice-strong-password

[alice]
type=aor
max_contacts=1
remove_existing=yes
remove_unavailable=yes
qualify_frequency=30

