[general]
static=yes
writeprotect=no

[default]
exten => s,1,NoOp(Default context)
 same => n,Hangup()

[caller_in]
exten => s,1,NoOp(Caller endpoint reached caller_in without dialed extension)
 same => n,Playback(ss-noservice)
 same => n,Hangup(1)
exten => h,1,NoOp(caller_in hangup handler)
 same => n,ExecIf($["${CALL_ID}" != ""]?UserEvent(PrivacyCallState,CallID:${CALL_ID},Leg:ALL,State:hangup,Reason:${HANGUPCAUSE},Channel:${CHANNEL}))
 same => n,Hangup()
; Single-endpoint media verification (client hears own voice back).
exten => *900,1,NoOp(Echo test from ${CALLERID(all)})
 same => n,Answer()
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Hangup()
; Fallback for clients that strip '*' during dialing.
exten => 900,1,Goto(caller_in,*900,1)
; Client-initiated calls are privacy-protected by default.
exten => _.,1,NoOp(Privacy client dial requested: ${EXTEN} from ${CALLERID(all)})
 same => n,Gosub(resolve_target,s,1(${EXTEN}))
 same => n,GotoIf($["${TARGET_ENDPOINT}"=""]?unknown)
 same => n,Gosub(select_virtual,s,1(${TARGET_E164}))
 same => n,Set(__CALL_ID=client-${UNIQUEID})
 same => n,Set(CALLER_ENDPOINT=${CUT(CUT(CHANNEL,/,2),-,1)})
 same => n,Set(CALLERID(name)=PrivacyProxy)
 same => n,Set(CALLERID(num)=${VIRTUAL_ID})
 same => n,NoOp(Privacy client dial target=${TARGET_ENDPOINT} callee=${TARGET_E164} virtual=${VIRTUAL_ID})
 same => n,UserEvent(PrivacyClientCallCreate,CallID:${CALL_ID},CallerEndpoint:${CALLER_ENDPOINT},CalleeE164:${TARGET_E164},TargetEndpoint:${TARGET_ENDPOINT},VirtualID:${VIRTUAL_ID},TimeoutSec:30,Channel:${CHANNEL})
 same => n,UserEvent(PrivacyCallState,CallID:${CALL_ID},Leg:A,State:answered,Channel:${CHANNEL})
 same => n,UserEvent(PrivacyCallState,CallID:${CALL_ID},Leg:B,State:dialing,Channel:PJSIP/${TARGET_ENDPOINT})
 same => n,Dial(PJSIP/${TARGET_ENDPOINT},30,b(outbound_trunk^setcid^1(${VIRTUAL_ID},${CALL_ID}))U(outbound_trunk^onanswer^1(${CALL_ID})))
 same => n,UserEvent(PrivacyCallState,CallID:${CALL_ID},Leg:B,State:${DIALSTATUS},Reason:${HANGUPCAUSE})
 same => n,Hangup()
 same => n(unknown),NoOp(Unknown privacy client destination ${EXTEN})
 same => n,Playback(ss-noservice)
 same => n,Hangup(1)

[direct_dial]
; Dial by endpoint name
exten => alice,1,NoOp(Direct SIP call to alice)
 same => n,Dial(PJSIP/alice,30)
 same => n,Hangup()

exten => bob,1,NoOp(Direct SIP call to bob)
 same => n,Dial(PJSIP/bob,30)
 same => n,Hangup()

exten => charlie,1,NoOp(Direct SIP call to charlie)
 same => n,Dial(PJSIP/charlie,30)
 same => n,Hangup()

; Dial by seeded E.164 aliases
exten => +8613900000001,1,Goto(direct_dial,alice,1)
exten => +8613900000002,1,Goto(direct_dial,bob,1)
exten => +8613900000003,1,Goto(direct_dial,charlie,1)

; Unknown destination fallback
exten => _X.,1,NoOp(Unknown direct dial destination ${EXTEN})
 same => n,Playback(ss-noservice)
 same => n,Hangup(1)
exten => _+X.,1,NoOp(Unknown direct dial destination ${EXTEN})
 same => n,Playback(ss-noservice)
 same => n,Hangup(1)

[resolve_target]
exten => s,1,NoOp(Resolve target from dial string '${ARG1}')
 same => n,Set(DIAL_WORK=${ARG1})
 same => n,ExecIf($["${DIAL_WORK:0:4}"="sip:"]?Set(DIAL_WORK=${DIAL_WORK:4}))
 same => n,ExecIf($["${DIAL_WORK:0:4}"="tel:"]?Set(DIAL_WORK=${DIAL_WORK:4}))
 same => n,Set(DIAL_USER=${CUT(DIAL_WORK,@,1)})
 same => n,Set(TARGET_ENDPOINT=)
 same => n,Set(TARGET_E164=)
 ; Primary path: resolve from Asterisk AstDB (synced from SQLite by scripts/sync-asterisk-astdb.sh).
 same => n,Set(TARGET_ENDPOINT=${DB(pc_users_by_e164/${DIAL_USER})})
 same => n,ExecIf($["${TARGET_ENDPOINT}" = ""]?Set(TARGET_ENDPOINT=${DIAL_USER}))
 same => n,Set(TARGET_E164=${DB(pc_users_by_endpoint/${TARGET_ENDPOINT})})
 same => n,GotoIf($["${TARGET_E164}" = ""]?legacy)
 same => n,Return()
 ; Backward-compatible fallback for default demo users if AstDB has not been synced yet.
 same => n(legacy),GotoIf($["${DIAL_USER}"="alice"]?alice)
 same => n,GotoIf($["${DIAL_USER}"="bob"]?bob)
 same => n,GotoIf($["${DIAL_USER}"="charlie"]?charlie)
 same => n,GotoIf($["${DIAL_USER}"="+8613900000001"]?alice)
 same => n,GotoIf($["${DIAL_USER}"="+8613900000002"]?bob)
 same => n,GotoIf($["${DIAL_USER}"="+8613900000003"]?charlie)
 same => n,Set(TARGET_ENDPOINT=)
 same => n,Set(TARGET_E164=)
 same => n,Return()
 same => n(alice),Set(TARGET_ENDPOINT=alice)
 same => n,Set(TARGET_E164=+8613900000001)
 same => n,Return()
 same => n(bob),Set(TARGET_ENDPOINT=bob)
 same => n,Set(TARGET_E164=+8613900000002)
 same => n,Return()
 same => n(charlie),Set(TARGET_ENDPOINT=charlie)
 same => n,Set(TARGET_E164=+8613900000003)
 same => n,Return()

[select_virtual]
exten => s,1,NoOp(Select virtual number for callee ${ARG1})
 ; Primary path: resolve from AstDB (pc_virtual_by_callee/<callee_e164>).
 same => n,Set(VIRTUAL_ID=${DB(pc_virtual_by_callee/${ARG1})})
 ; Fallback to AstDB default virtual number.
 same => n,ExecIf($["${VIRTUAL_ID}" = ""]?Set(VIRTUAL_ID=${DB(pc_virtual_default/default)}))
 ; Last-resort compatibility fallback.
 same => n,ExecIf($["${VIRTUAL_ID}" = ""]?Set(VIRTUAL_ID=+8613800011113))
 same => n,Return()

[privacy_message_in]
exten => _.,1,NoOp(Privacy SIP MESSAGE to ${EXTEN} from ${MESSAGE(from)})
 same => n,Set(MSG_ID=msg-${EPOCH}-${RAND(100000,999999)})
 same => n,Set(SENDER_ENDPOINT=${CUT(CUT(CHANNEL,/,2),-,1)})
 same => n,ExecIf($["${SENDER_ENDPOINT}" = "ast_msg_queue"]?Set(SENDER_ENDPOINT=${CUT(CUT(CUT(MESSAGE(from),<,2),>,1),@,1)}))
 same => n,ExecIf($["${SENDER_ENDPOINT}" = ""]?Set(SENDER_ENDPOINT=${CUT(MESSAGE(from),@,1)}))
 same => n,ExecIf($["${SENDER_ENDPOINT:0:4}" = "sip:"]?Set(SENDER_ENDPOINT=${SENDER_ENDPOINT:4}))
 same => n,Set(MSG_BODY=${MESSAGE(body)})
 same => n,Set(MSG_BODY_BYTES=${LEN(${MSG_BODY})})
 same => n,Set(MSG_CONTENT_TYPE=${PJSIP_HEADER(read,Content-Type)})
 same => n,ExecIf($["${MSG_CONTENT_TYPE}" = ""]?Set(MSG_CONTENT_TYPE=${MESSAGE_DATA(Content-Type)}))
 same => n,ExecIf($["${MSG_CONTENT_TYPE}" = ""]?Set(MSG_CONTENT_TYPE=text/plain))
 same => n,Set(MSG_CONTENT_TYPE_LOWER=${TOLOWER(${MSG_CONTENT_TYPE})})
 same => n,Set(MSG_CONTENT_TYPE_PREFIX=${MSG_CONTENT_TYPE_LOWER:0:10})
 same => n,GotoIf($["${MSG_CONTENT_TYPE_PREFIX}" != "text/plain"]?invalid_type)
 same => n,GotoIf($[${MSG_BODY_BYTES} < 1]?invalid_body)
 same => n,GotoIf($[${MSG_BODY_BYTES} > 1024]?body_too_large)
 same => n,Set(SENDER_E164=${DB(pc_users_by_endpoint/${SENDER_ENDPOINT})})
 same => n,GotoIf($["${SENDER_E164}" = ""]?sender_unknown)
 same => n,Gosub(resolve_target,s,1(${EXTEN}))
 same => n,GotoIf($["${TARGET_ENDPOINT}" = ""]?unknown_target)
 same => n,Set(TARGET_DEVSTATE=${DEVICE_STATE(PJSIP/${TARGET_ENDPOINT})})
 same => n,GotoIf($["${TARGET_DEVSTATE}" = "UNAVAILABLE" | "${TARGET_DEVSTATE}" = "UNKNOWN" | "${TARGET_DEVSTATE}" = "INVALID"]?target_offline)
 same => n,Gosub(select_virtual,s,1(${TARGET_E164}))
 same => n,Set(MSG_FROM_URI=${MESSAGE(from)})
 same => n,Set(MSG_FROM_URI=${CUT(CUT(MSG_FROM_URI,<,2),>,1)})
 same => n,ExecIf($["${MSG_FROM_URI}" = ""]?Set(MSG_FROM_URI=${MESSAGE(from)}))
 same => n,ExecIf($["${MSG_FROM_URI:0:4}" = "sip:"]?Set(MSG_FROM_URI=${MSG_FROM_URI:4}))
 same => n,Set(MSG_FROM_DOMAIN=${CUT(MSG_FROM_URI,@,2)})
 same => n,ExecIf($["${MSG_FROM_DOMAIN}" = ""]?Set(MSG_FROM_DOMAIN=privacy.local))
 same => n,Set(MESSAGE(from)=sip:${VIRTUAL_ID}@${MSG_FROM_DOMAIN})
 same => n,Set(MSG_BODY_ENC=${URIENCODE(${MSG_BODY})})
 same => n,UserEvent(PrivacyMessageState,MessageID:${MSG_ID},State:created,SenderEndpoint:${SENDER_ENDPOINT},TargetEndpoint:${TARGET_ENDPOINT},TargetE164:${TARGET_E164},VirtualID:${VIRTUAL_ID},ContentType:${MSG_CONTENT_TYPE_LOWER},BodyBytes:${MSG_BODY_BYTES},BodyEncoded:${MSG_BODY_ENC})
 same => n,UserEvent(PrivacyMessageState,MessageID:${MSG_ID},State:routing,SenderEndpoint:${SENDER_ENDPOINT},TargetEndpoint:${TARGET_ENDPOINT},TargetE164:${TARGET_E164},VirtualID:${VIRTUAL_ID},ContentType:${MSG_CONTENT_TYPE_LOWER},BodyBytes:${MSG_BODY_BYTES},BodyEncoded:${MSG_BODY_ENC})
 same => n,MessageSend(pjsip:${TARGET_ENDPOINT},${MESSAGE(from)})
 same => n,Set(MSG_SEND_STATUS=${MESSAGE_SEND_STATUS})
 same => n,GotoIf($["${MSG_SEND_STATUS}" = "SUCCESS"]?delivered:send_failed)
 same => n(delivered),UserEvent(PrivacyMessageState,MessageID:${MSG_ID},State:delivered,SenderEndpoint:${SENDER_ENDPOINT},TargetEndpoint:${TARGET_ENDPOINT},TargetE164:${TARGET_E164},VirtualID:${VIRTUAL_ID},ContentType:${MSG_CONTENT_TYPE_LOWER},BodyBytes:${MSG_BODY_BYTES},BodyEncoded:${MSG_BODY_ENC})
 same => n,Hangup()
 same => n(send_failed),UserEvent(PrivacyMessageState,MessageID:${MSG_ID},State:failed,Reason:message_send_${MSG_SEND_STATUS},SenderEndpoint:${SENDER_ENDPOINT},TargetEndpoint:${TARGET_ENDPOINT},TargetE164:${TARGET_E164},VirtualID:${VIRTUAL_ID},ContentType:${MSG_CONTENT_TYPE_LOWER},BodyBytes:${MSG_BODY_BYTES},BodyEncoded:${MSG_BODY_ENC})
 same => n,Hangup()
 same => n(invalid_type),Set(MSG_BODY_ENC=${URIENCODE(${MSG_BODY})})
 same => n,UserEvent(PrivacyMessageState,MessageID:${MSG_ID},State:failed,Reason:invalid_content_type,SenderEndpoint:${SENDER_ENDPOINT},TargetEndpoint:,TargetE164:,VirtualID:,ContentType:${MSG_CONTENT_TYPE_LOWER},BodyBytes:${MSG_BODY_BYTES},BodyEncoded:${MSG_BODY_ENC})
 same => n,Hangup()
 same => n(invalid_body),Set(MSG_BODY_ENC=${URIENCODE(${MSG_BODY})})
 same => n,UserEvent(PrivacyMessageState,MessageID:${MSG_ID},State:failed,Reason:empty_body,SenderEndpoint:${SENDER_ENDPOINT},TargetEndpoint:,TargetE164:,VirtualID:,ContentType:${MSG_CONTENT_TYPE_LOWER},BodyBytes:${MSG_BODY_BYTES},BodyEncoded:${MSG_BODY_ENC})
 same => n,Hangup()
 same => n(body_too_large),Set(MSG_BODY_ENC=${URIENCODE(${MSG_BODY})})
 same => n,UserEvent(PrivacyMessageState,MessageID:${MSG_ID},State:failed,Reason:body_too_large,SenderEndpoint:${SENDER_ENDPOINT},TargetEndpoint:,TargetE164:,VirtualID:,ContentType:${MSG_CONTENT_TYPE_LOWER},BodyBytes:${MSG_BODY_BYTES},BodyEncoded:${MSG_BODY_ENC})
 same => n,Hangup()
 same => n(sender_unknown),Set(MSG_BODY_ENC=${URIENCODE(${MSG_BODY})})
 same => n,UserEvent(PrivacyMessageState,MessageID:${MSG_ID},State:failed,Reason:sender_unknown,SenderEndpoint:${SENDER_ENDPOINT},TargetEndpoint:,TargetE164:,VirtualID:,ContentType:${MSG_CONTENT_TYPE_LOWER},BodyBytes:${MSG_BODY_BYTES},BodyEncoded:${MSG_BODY_ENC})
 same => n,Hangup()
 same => n(unknown_target),Set(MSG_BODY_ENC=${URIENCODE(${MSG_BODY})})
 same => n,UserEvent(PrivacyMessageState,MessageID:${MSG_ID},State:failed,Reason:target_not_found,SenderEndpoint:${SENDER_ENDPOINT},TargetEndpoint:${TARGET_ENDPOINT},TargetE164:${TARGET_E164},VirtualID:,ContentType:${MSG_CONTENT_TYPE_LOWER},BodyBytes:${MSG_BODY_BYTES},BodyEncoded:${MSG_BODY_ENC})
 same => n,Hangup()
 same => n(target_offline),Set(MSG_BODY_ENC=${URIENCODE(${MSG_BODY})})
 same => n,UserEvent(PrivacyMessageState,MessageID:${MSG_ID},State:failed,Reason:target_offline,SenderEndpoint:${SENDER_ENDPOINT},TargetEndpoint:${TARGET_ENDPOINT},TargetE164:${TARGET_E164},VirtualID:,ContentType:${MSG_CONTENT_TYPE_LOWER},BodyBytes:${MSG_BODY_BYTES},BodyEncoded:${MSG_BODY_ENC})
 same => n,Hangup()

[privacy_bridge]
exten => s,1,NoOp(Privacy bridge call_id=${CALL_ID} callee=${CALLEE_E164} dial=${B_DIALSTR})
 same => n,Set(__CALL_ID=${CALL_ID})
 same => n,Set(__VIRTUAL_ID=${VIRTUAL_ID})
 same => n,Set(__B_DIALSTR=${B_DIALSTR})
 same => n,Set(__CALL_TIMEOUT_SEC=${IF($["${CALL_TIMEOUT_SEC}" = ""]?30:${CALL_TIMEOUT_SEC})})
 same => n,UserEvent(PrivacyCallState,CallID:${CALL_ID},Leg:A,State:answered,Channel:${CHANNEL})
 same => n,UserEvent(PrivacyCallState,CallID:${CALL_ID},Leg:B,State:dialing,Channel:${B_DIALSTR})
 same => n,Dial(${B_DIALSTR},${CALL_TIMEOUT_SEC},b(outbound_trunk^setcid^1(${VIRTUAL_ID},${CALL_ID}))U(outbound_trunk^onanswer^1(${CALL_ID})))
 same => n,UserEvent(PrivacyCallState,CallID:${CALL_ID},Leg:B,State:${DIALSTATUS},Reason:${HANGUPCAUSE})
 same => n,Hangup()

exten => h,1,NoOp(Privacy bridge hangup call_id=${CALL_ID})
 same => n,UserEvent(PrivacyCallState,CallID:${CALL_ID},Leg:ALL,State:hangup,Reason:${HANGUPCAUSE},Channel:${CHANNEL})
 same => n,Hangup()

[outbound_trunk]
exten => setcid,1,NoOp(Apply masked caller ID)
 same => n,Set(CALLERID(num)=${ARG1})
 same => n,Set(__CALL_ID=${ARG2})
 same => n,Return()

exten => onanswer,1,NoOp(B leg answered)
 same => n,UserEvent(PrivacyCallState,CallID:${ARG1},Leg:B,State:answered,Channel:${CHANNEL})
 same => n,Return()
